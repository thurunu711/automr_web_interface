{% if files %}
<div class="row">
    {% for f in files %}
    <div class="col-lg-4 col-md-6">
        <div class="text-center card">
            <div class="card-body">
                <div class="pt-2 pb-2">
                    {% if f.kind == "image" %}
                    <img src="{% url 'robustness:testrun_download_file' run.pk f.rel %}"
                         class="rounded img-thumbnail avatar-xl" alt="{{ f.rel }}">
                    {% else %}
                    <div class="avatar-xl mx-auto rounded-circle bg-light d-flex align-items-center justify-content-center">
                        <i class="mdi {% if f.kind == 'csv' %}mdi-chart-bar{% elif f.kind == 'text' %}mdi-text-box-outline{% else %}mdi-file-outline{% endif %} text-primary"
                           style="font-size: 2.25rem;"></i>
                    </div>
                    {% endif %}

                    <h4 class="mt-3 text-truncate" title="{{ f.rel }}">
                        <code class="text-dark">{{ f.rel }}</code>
                    </h4>
                    <p class="text-muted">{{ f.size|filesizeformat }}</p>

                    {% if f.kind != "other" %}
<button type="button" class="btn btn-primary btn-sm waves-effect waves-light file-preview-btn"
        data-url="{% url 'robustness:testrun_download_file' run.pk f.rel %}"
        data-name="{{ f.rel }}"
        data-kind="{{ f.kind }}"
        data-size="{{ f.size }}"
        data-chart-url="{% url 'robustness:testrun_csv_chart_data' run.pk f.rel %}">
    Preview
</button>
                    {% endif %}
                    <a href="{% url 'robustness:testrun_download_file' run.pk f.rel %}" class="btn btn-light btn-sm waves-effect">
                        Download
                    </a>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<p class="text-muted mb-0">No files in this category.</p>
{% endif %}
